<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Ingeniería - En Construcción</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .contact-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .contact-info a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        
        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔧</div>
        <h1>En Construcción</h1>
        <p>Estamos trabajando para traerte una experiencia increíble.<br>Vuelve pronto para descubrir lo que Standard Ingeniería tiene para ti.</p>
        <div class="contact-info">
            <p>¿Preguntas? Contáctanos:</p>
            <a href="mailto:oscar.perez@standard-ingenieria.com">oscar.perez@standard-ingenieria.com</a>
        </div>
    </div>
</body>
</html>
