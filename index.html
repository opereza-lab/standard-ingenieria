<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standard Engineering | Próximamente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #0d1528 url('coming-soon.jpg') center center / cover no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
    }
    .panel {
      margin-bottom: 48px;
      padding: 28px 40px;
      background: rgba(13, 21, 40, 0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .panel p {
      color: rgba(255, 255, 255, 0.85);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .btn {
      display: inline-block;
      padding: 14px 40px;
      background: #e07820;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="panel">
    <p>Si quieres volver a Standard Equipment, haz click abajo</p>
    <a class="btn" href="https://www.standard-equipment.cl">Volver</a>
  </div>
</body>
</html>
